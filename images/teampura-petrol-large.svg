<svg width="380" height="104" viewBox="0 0 380 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="pt1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A5260"/>
      <stop offset="100%" stop-color="#0F3A46"/>
    </linearGradient>
    <linearGradient id="pt2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E7A8A"/>
      <stop offset="100%" stop-color="#155E6E"/>
    </linearGradient>
    <linearGradient id="pt3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2AACB8"/>
      <stop offset="100%" stop-color="#1A8898"/>
    </linearGradient>
    <linearGradient id="pt4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F88C50"/>
      <stop offset="100%" stop-color="#E25A14"/>
    </linearGradient>
    <filter id="ptsh" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="ptglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feFlood flood-color="#F06A28" flood-opacity="0.28" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stone 1: base -->
  <ellipse cx="50" cy="88" rx="32" ry="8.5" fill="url(#pt1)" filter="url(#ptsh)"/>
  <ellipse cx="43" cy="85" rx="11" ry="2.5" fill="white" opacity="0.06"/>
  <!-- Stone 2 -->
  <ellipse cx="50" cy="72" rx="24" ry="7" fill="url(#pt2)" transform="rotate(-2 50 72)" filter="url(#ptsh)"/>
  <ellipse cx="44" cy="69.5" rx="8" ry="2" fill="white" opacity="0.07" transform="rotate(-2 44 69.5)"/>
  <!-- Stone 3 -->
  <ellipse cx="51" cy="58" rx="16" ry="6" fill="url(#pt3)" transform="rotate(1.5 51 58)" filter="url(#ptsh)"/>
  <ellipse cx="47" cy="56" rx="5.5" ry="1.6" fill="white" opacity="0.09" transform="rotate(1.5 47 56)"/>
  <!-- Stone 4: top salmon — glowing -->
  <ellipse cx="50" cy="45" rx="10" ry="5" fill="url(#pt4)" transform="rotate(-1 50 45)" filter="url(#ptglow)"/>
  <ellipse cx="47" cy="43" rx="3.5" ry="1.3" fill="white" opacity="0.28" transform="rotate(-1 47 43)"/>

  <!-- Hairline gaps — petrol bg colour -->
  <line x1="20" y1="79.8" x2="80" y2="79.8" stroke="rgba(0,0,0,0.35)" stroke-width="1.3" opacity="0.95"/>
  <line x1="28" y1="65.2" x2="72" y2="65.2" stroke="rgba(0,0,0,0.35)" stroke-width="1.2" opacity="0.90"/>
  <line x1="36" y1="50.2" x2="64" y2="50.2" stroke="rgba(0,0,0,0.35)" stroke-width="1.0" opacity="0.85"/>

  <!-- Ground glow -->
  <ellipse cx="50" cy="96" rx="28" ry="4" fill="#2AACB8" opacity="0.10"/>

  <!-- Wordmark: white team, orange pura -->
  <text font-family="Outfit, sans-serif" font-size="42" letter-spacing="-1.8">
    <tspan x="100" y="76" font-weight="700" fill="#ffffff">team</tspan><tspan dy="0" font-weight="400" fill="#F06A28">pura</tspan>
  </text>

  <!-- Tagline -->
  <text x="101" y="91" font-family="Outfit, sans-serif" font-weight="400" font-size="9" letter-spacing="3.4" fill="rgba(255,255,255,0.28)">PEOPLE PLATFORM</text>
</svg>
