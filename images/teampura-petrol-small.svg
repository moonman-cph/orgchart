<svg width="220" height="60" viewBox="0 0 220 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pts1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A5260"/>
      <stop offset="100%" stop-color="#0F3A46"/>
    </linearGradient>
    <linearGradient id="pts2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E7A8A"/>
      <stop offset="100%" stop-color="#155E6E"/>
    </linearGradient>
    <linearGradient id="pts3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2AACB8"/>
      <stop offset="100%" stop-color="#1A8898"/>
    </linearGradient>
    <linearGradient id="pts4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F88C50"/>
      <stop offset="100%" stop-color="#E25A14"/>
    </linearGradient>
    <filter id="ptssh" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="ptsglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#F06A28" flood-opacity="0.28" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <ellipse cx="28" cy="50" rx="18" ry="5" fill="url(#pts1)" filter="url(#ptssh)"/>
  <ellipse cx="24" cy="48" rx="6" ry="1.5" fill="white" opacity="0.06"/>
  <ellipse cx="28" cy="40" rx="14" ry="4" fill="url(#pts2)" transform="rotate(-2 28 40)" filter="url(#ptssh)"/>
  <ellipse cx="24" cy="38.5" rx="5" ry="1.2" fill="white" opacity="0.07" transform="rotate(-2 24 38.5)"/>
  <ellipse cx="28.5" cy="31.5" rx="9.5" ry="3.5" fill="url(#pts3)" transform="rotate(1.5 28.5 31.5)" filter="url(#ptssh)"/>
  <ellipse cx="26" cy="30" rx="3.5" ry="1" fill="white" opacity="0.09" transform="rotate(1.5 26 30)"/>
  <ellipse cx="28" cy="24" rx="6" ry="3" fill="url(#pts4)" transform="rotate(-1 28 24)" filter="url(#ptsglow)"/>
  <ellipse cx="26" cy="22.5" rx="2" ry="0.8" fill="white" opacity="0.26" transform="rotate(-1 26 22.5)"/>

  <line x1="11" y1="45.2" x2="45" y2="45.2" stroke="rgba(0,0,0,0.35)" stroke-width="0.9" opacity="0.95"/>
  <line x1="15" y1="36.2" x2="41" y2="36.2" stroke="rgba(0,0,0,0.35)" stroke-width="0.8" opacity="0.90"/>
  <line x1="20" y1="28.0" x2="37" y2="28.0" stroke="rgba(0,0,0,0.35)" stroke-width="0.7" opacity="0.85"/>

  <ellipse cx="28" cy="55" rx="16" ry="2.5" fill="#2AACB8" opacity="0.10"/>

  <text font-family="Outfit, sans-serif" font-size="24" letter-spacing="-1.0">
    <tspan x="57" y="43" font-weight="700" fill="#ffffff">team</tspan><tspan dy="0" font-weight="400" fill="#F06A28">pura</tspan>
  </text>
  <text x="58" y="53" font-family="Outfit, sans-serif" font-weight="400" font-size="6" letter-spacing="2.4" fill="rgba(255,255,255,0.28)">PEOPLE PLATFORM</text>
</svg>
