<svg width="380" height="104" viewBox="0 0 380 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dk1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A5C57"/>
      <stop offset="100%" stop-color="#0A2E2C"/>
    </linearGradient>
    <linearGradient id="dk2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F9082"/>
      <stop offset="100%" stop-color="#0F4A44"/>
    </linearGradient>
    <linearGradient id="dk3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3AC4B2"/>
      <stop offset="100%" stop-color="#1A8C7E"/>
    </linearGradient>
    <linearGradient id="dk4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F88A4E"/>
      <stop offset="100%" stop-color="#E05A14"/>
    </linearGradient>
    <filter id="dksh" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="dkglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#F06A28" flood-opacity="0.30" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stone 1: base -->
  <ellipse cx="50" cy="88" rx="32" ry="8.5" fill="url(#dk1)" filter="url(#dksh)"/>
  <ellipse cx="43" cy="85" rx="11" ry="2.5" fill="white" opacity="0.05"/>
  <!-- Stone 2 -->
  <ellipse cx="50" cy="72" rx="24" ry="7" fill="url(#dk2)" transform="rotate(-2 50 72)" filter="url(#dksh)"/>
  <ellipse cx="44" cy="69.5" rx="8" ry="2" fill="white" opacity="0.06" transform="rotate(-2 44 69.5)"/>
  <!-- Stone 3 -->
  <ellipse cx="51" cy="58" rx="16" ry="6" fill="url(#dk3)" transform="rotate(1.5 51 58)" filter="url(#dksh)"/>
  <ellipse cx="47" cy="56" rx="5.5" ry="1.6" fill="white" opacity="0.08" transform="rotate(1.5 47 56)"/>
  <!-- Stone 4: top salmon — glowing -->
  <ellipse cx="50" cy="45" rx="10" ry="5" fill="url(#dk4)" transform="rotate(-1 50 45)" filter="url(#dkglow)"/>
  <ellipse cx="47" cy="43" rx="3.5" ry="1.3" fill="white" opacity="0.22" transform="rotate(-1 47 43)"/>

  <!-- Hairline gaps — dark bg colour -->
  <line x1="20" y1="79.8" x2="80" y2="79.8" stroke="rgba(0,0,0,0.35)" stroke-width="1.2" opacity="0.95"/>
  <line x1="28" y1="65.2" x2="72" y2="65.2" stroke="rgba(0,0,0,0.35)" stroke-width="1.1" opacity="0.90"/>
  <line x1="36" y1="50.2" x2="64" y2="50.2" stroke="rgba(0,0,0,0.35)" stroke-width="1.0" opacity="0.85"/>

  <!-- Ground glow -->
  <ellipse cx="50" cy="96" rx="28" ry="4" fill="#1A8C7E" opacity="0.14"/>

  <!-- Wordmark: white team, orange pura -->
  <text font-family="Outfit, sans-serif" font-size="42" letter-spacing="-1.8">
    <tspan x="100" y="76" font-weight="700" fill="#ffffff">team</tspan><tspan dy="0" font-weight="400" fill="#F06A28">pura</tspan>
  </text>

  <!-- Tagline -->
  <text x="101" y="91" font-family="Outfit, sans-serif" font-weight="400" font-size="9" letter-spacing="3.4" fill="#2A6660">PEOPLE PLATFORM</text>
</svg>
