<svg width="48" height="56" viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="il1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#145E58"/>
      <stop offset="100%" stop-color="#0A3835"/>
    </linearGradient>
    <linearGradient id="il2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E9688"/>
      <stop offset="100%" stop-color="#0F5C56"/>
    </linearGradient>
    <linearGradient id="il3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3EC4B3"/>
      <stop offset="100%" stop-color="#1A8C7E"/>
    </linearGradient>
    <linearGradient id="il4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5844A"/>
      <stop offset="100%" stop-color="#E25A14"/>
    </linearGradient>
    <filter id="ilsh" x="-40%" y="-20%" width="180%" height="180%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0A3835" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Stone 1: base -->
  <ellipse cx="24" cy="50" rx="22" ry="6" fill="url(#il1)" filter="url(#ilsh)"/>
  <ellipse cx="19" cy="47.5" rx="7.5" ry="1.8" fill="white" opacity="0.07"/>
  <!-- Stone 2 -->
  <ellipse cx="24" cy="38" rx="16" ry="5" fill="url(#il2)" transform="rotate(-2 24 38)" filter="url(#ilsh)"/>
  <ellipse cx="20" cy="36" rx="5.5" ry="1.5" fill="white" opacity="0.08" transform="rotate(-2 20 36)"/>
  <!-- Stone 3 -->
  <ellipse cx="24.5" cy="27.5" rx="11" ry="4" fill="url(#il3)" transform="rotate(1.5 24.5 27.5)" filter="url(#ilsh)"/>
  <ellipse cx="21.5" cy="26" rx="4" ry="1.1" fill="white" opacity="0.10" transform="rotate(1.5 21.5 26)"/>
  <!-- Stone 4: top salmon -->
  <ellipse cx="24" cy="18.5" rx="7" ry="3.5" fill="url(#il4)" transform="rotate(-1 24 18.5)" filter="url(#ilsh)"/>
  <ellipse cx="21.5" cy="17" rx="2.5" ry="0.9" fill="white" opacity="0.26" transform="rotate(-1 21.5 17)"/>

  <!-- Gaps -->
  <line x1="3"  y1="44.2" x2="45" y2="44.2" stroke="rgba(255,255,255,0.85)" stroke-width="1.0" opacity="0.9"/>
  <line x1="9"  y1="33.2" x2="39" y2="33.2" stroke="rgba(255,255,255,0.85)" stroke-width="0.9" opacity="0.85"/>
  <line x1="14" y1="23.8" x2="35" y2="23.8" stroke="rgba(255,255,255,0.85)" stroke-width="0.8" opacity="0.80"/>

  <!-- Ground shadow -->
  <ellipse cx="24" cy="56" rx="18" ry="2.5" fill="#0A3835" opacity="0.06"/>
</svg>
