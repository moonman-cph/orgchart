<svg width="380" height="104" viewBox="0 0 380 104" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="l1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#145E58"/>
      <stop offset="100%" stop-color="#0A3835"/>
    </linearGradient>
    <linearGradient id="l2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E9688"/>
      <stop offset="100%" stop-color="#0F5C56"/>
    </linearGradient>
    <linearGradient id="l3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3EC4B3"/>
      <stop offset="100%" stop-color="#1A8C7E"/>
    </linearGradient>
    <linearGradient id="l4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5844A"/>
      <stop offset="100%" stop-color="#E25A14"/>
    </linearGradient>
    <filter id="lsh" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="2.5" flood-color="#0A3835" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- Stone 1: base -->
  <ellipse cx="50" cy="88" rx="32" ry="8.5" fill="url(#l1)" filter="url(#lsh)"/>
  <ellipse cx="43" cy="85" rx="11" ry="2.5" fill="white" opacity="0.07"/>
  <!-- Stone 2 -->
  <ellipse cx="50" cy="72" rx="24" ry="7" fill="url(#l2)" transform="rotate(-2 50 72)" filter="url(#lsh)"/>
  <ellipse cx="44" cy="69.5" rx="8" ry="2" fill="white" opacity="0.08" transform="rotate(-2 44 69.5)"/>
  <!-- Stone 3 -->
  <ellipse cx="51" cy="58" rx="16" ry="6" fill="url(#l3)" transform="rotate(1.5 51 58)" filter="url(#lsh)"/>
  <ellipse cx="47" cy="56" rx="5.5" ry="1.6" fill="white" opacity="0.10" transform="rotate(1.5 47 56)"/>
  <!-- Stone 4: top salmon -->
  <ellipse cx="50" cy="45" rx="10" ry="5" fill="url(#l4)" transform="rotate(-1 50 45)" filter="url(#lsh)"/>
  <ellipse cx="47" cy="43" rx="3.5" ry="1.3" fill="white" opacity="0.24" transform="rotate(-1 47 43)"/>

  <!-- Hairline gaps -->
  <line x1="20" y1="79.8" x2="80" y2="79.8" stroke="rgba(255,255,255,0.85)" stroke-width="1.1" opacity="0.9"/>
  <line x1="28" y1="65.2" x2="72" y2="65.2" stroke="rgba(255,255,255,0.85)" stroke-width="1.0" opacity="0.85"/>
  <line x1="36" y1="50.2" x2="64" y2="50.2" stroke="rgba(255,255,255,0.85)" stroke-width="0.9" opacity="0.80"/>

  <!-- Ground shadow -->
  <ellipse cx="50" cy="96" rx="28" ry="3.5" fill="#0A3835" opacity="0.055"/>

  <!-- Wordmark -->
  <text font-family="Outfit, sans-serif" font-size="42" letter-spacing="-1.8">
    <tspan x="100" y="76" font-weight="700" fill="#0A3835">team</tspan><tspan dy="0" font-weight="400" fill="#F06A28">pura</tspan>
  </text>

  <!-- Tagline -->
  <text x="101" y="91" font-family="Outfit, sans-serif" font-weight="400" font-size="9" letter-spacing="3.4" fill="#9db8b5">PEOPLE PLATFORM</text>
</svg>
